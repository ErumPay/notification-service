server:
  port: 8085

spring:
  application:
    name: notification

  datasource:
    url: jdbc:mysql://localhost:3308/notification_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

notification:
  clients:
    auth-service:
      url: http://localhost:8081

resilience4j:
  circuitbreaker:
    instances:
      authDeviceTokenClient:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      authDeviceTokenClient:
        max-attempts: 2
        wait-duration: 200ms
